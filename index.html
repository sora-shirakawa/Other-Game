<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Orbit Pulse Runner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1021;
      --panel: #111939;
      --panel-border: #3e4fa2;
      --accent: #82cfff;
      --danger: #ff6384;
      --safe: #54f0ab;
      --text: #eef5ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #16224f 0%, var(--bg) 55%, #05070f 100%);
      color: var(--text);
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
    }

    #gameRoot {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .panel {
      background: color-mix(in oklab, var(--panel), black 12%);
      border: 1px solid color-mix(in oklab, var(--panel-border), black 20%);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .label {
      opacity: 0.8;
      font-size: 11px;
      line-height: 1.2;
    }

    .value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 2px;
      line-height: 1.1;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      border: 1px solid #3e4fa2;
      background: linear-gradient(180deg, rgba(18, 27, 68, 0.95), rgba(11, 14, 35, 0.95));
      box-shadow: 0 0 24px rgba(7, 13, 43, 0.55);
      display: block;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 1px solid #5f78ff;
      background: linear-gradient(180deg, #3654ff, #2135a6);
      color: white;
      border-radius: 10px;
      font-size: 16px;
      padding: 12px;
      font-weight: 700;
    }

    button.secondary {
      border-color: #53608e;
      background: linear-gradient(180deg, #283150, #1b223c);
      font-weight: 600;
    }

    #message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
      padding: 16px;
      font-weight: 700;
      font-size: clamp(18px, 3.2vw, 28px);
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.65);
    }

    #tip {
      font-size: 12px;
      text-align: center;
      opacity: 0.8;
      margin-top: 4px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="gameRoot">
    <div class="hud">
      <div class="panel"><div class="label">SCORE</div><div class="value" id="score">0</div></div>
      <div class="panel"><div class="label">WAVE</div><div class="value" id="wave">1</div></div>
      <div class="panel"><div class="label">LIFE</div><div class="value" id="life">3</div></div>
      <div class="panel"><div class="label">BEST</div><div class="value" id="best">0</div></div>
    </div>

    <div style="position:relative;min-height:0;">
      <canvas id="gameCanvas" width="720" height="1280"></canvas>
      <div id="message"></div>
    </div>

    <div>
      <div class="controls">
        <button id="startBtn">スタート / リスタート</button>
        <button class="secondary" id="pauseBtn">ポーズ</button>
      </div>
      <div id="tip"></div>
    </div>
  </div>

  <script>
    // Unity移植の考え方:
    // - Player, Enemy, Orb, Powerup を MonoBehaviour へ分離しやすい構成で実装。
    // - update(dt) を Unity の Update() / FixedUpdate() に置換しやすい。
    // - ベクトル演算をシンプル化しているため、Vector2 に直訳可能。
    (() => {
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const waveEl = document.getElementById("wave");
      const lifeEl = document.getElementById("life");
      const bestEl = document.getElementById("best");
      const messageEl = document.getElementById("message");
      const tipEl = document.getElementById("tip");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");

      const state = {
        running: false,
        paused: false,
        gameOver: false,
        score: 0,
        life: 3,
        wave: 1,
        elapsed: 0,
        enemyTimer: 0,
        powerTimer: 0,
        invuln: 0,
        best: Number(localStorage.getItem("orbit_best") || 0),
      };

      const world = {
        w: canvas.width,
        h: canvas.height,
        centerX: canvas.width / 2,
        centerY: canvas.height / 2,
      };

      const player = {
        lane: 1,
        radius: 22,
        orbitR: [140, 230, 320],
        angle: -Math.PI / 2,
        speed: 2.15,
        boostTimer: 0,
      };

      const enemies = [];
      const powerups = [];
      const particles = [];

      let rafId = 0;
      let lastTime = 0;
      let pointerStartX = null;

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        canvas.width = Math.floor(rect.width * ratio);
        canvas.height = Math.floor(rect.height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

        world.w = rect.width;
        world.h = rect.height;
        world.centerX = rect.width / 2;
        world.centerY = rect.height / 2;
      }

      function setMessage(text) {
        messageEl.textContent = text;
      }

      function setTip(text) {
        tipEl.textContent = text;
      }

      function resetGame() {
        state.running = true;
        state.paused = false;
        state.gameOver = false;
        state.score = 0;
        state.life = 3;
        state.wave = 1;
        state.elapsed = 0;
        state.enemyTimer = 0;
        state.powerTimer = 2.2;
        state.invuln = 0;

        player.lane = 1;
        player.angle = -Math.PI / 2;
        player.speed = 2.15;
        player.boostTimer = 0;

        enemies.length = 0;
        powerups.length = 0;
        particles.length = 0;

        setMessage("");
        setTip("左右スワイプ（または←→）でレーン移動。長く生きるほど高得点！");
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(state.score);
        waveEl.textContent = state.wave;
        lifeEl.textContent = state.life;
        bestEl.textContent = Math.floor(state.best);
      }

      function spawnEnemy() {
        const lane = (Math.random() * 3) | 0;
        const startAngle = Math.random() * Math.PI * 2;
        const clockwise = Math.random() > 0.5;
        const baseSpeed = 0.9 + state.wave * 0.05 + Math.random() * 0.7;

        enemies.push({
          lane,
          angle: startAngle,
          radius: 20,
          speed: (clockwise ? 1 : -1) * baseSpeed,
          hp: 1,
          color: Math.random() > 0.85 ? "#ffac4f" : "#ff6384",
        });
      }

      function spawnPowerup() {
        const lane = (Math.random() * 3) | 0;
        const types = ["shield", "pulse", "life"];
        const type = types[(Math.random() * types.length) | 0];

        powerups.push({
          lane,
          angle: Math.random() * Math.PI * 2,
          radius: 15,
          type,
          ttl: 10,
        });
      }

      function emit(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const v = 35 + Math.random() * 120;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v,
            life: 0.5 + Math.random() * 0.6,
            color,
          });
        }
      }

      function laneMove(dir) {
        if (!state.running || state.paused || state.gameOver) return;
        player.lane = Math.max(0, Math.min(2, player.lane + dir));
      }

      function playerPos() {
        const r = player.orbitR[player.lane] * (world.w / 720);
        return {
          x: world.centerX + Math.cos(player.angle) * r,
          y: world.centerY + Math.sin(player.angle) * r,
          r,
        };
      }

      function objPos(obj) {
        const r = player.orbitR[obj.lane] * (world.w / 720);
        return {
          x: world.centerX + Math.cos(obj.angle) * r,
          y: world.centerY + Math.sin(obj.angle) * r,
          r,
        };
      }

      function applyPowerup(type) {
        if (type === "shield") {
          state.invuln = Math.max(state.invuln, 3.5);
          setTip("シールド展開！ 3.5秒間無敵");
        } else if (type === "pulse") {
          player.boostTimer = 4.0;
          setTip("パルス加速！ 回転スピードアップ");
        } else if (type === "life") {
          state.life = Math.min(5, state.life + 1);
          setTip("ライフ回復 +1");
        }
      }

      function damagePlayer() {
        if (state.invuln > 0) return;
        state.life -= 1;
        state.invuln = 1.4;
        setTip("被弾！ 連続で避けてスコアを取り返そう");

        if (state.life <= 0) {
          state.gameOver = true;
          state.running = false;
          state.best = Math.max(state.best, state.score);
          localStorage.setItem("orbit_best", String(Math.floor(state.best)));
          setMessage(`GAME OVER\nSCORE ${Math.floor(state.score)}\nタップで再挑戦`);
          updateHud();
        }
      }

      function update(dt) {
        if (!state.running || state.paused || state.gameOver) return;

        state.elapsed += dt;
        state.score += dt * (10 + state.wave * 2);
        state.wave = 1 + Math.floor(state.elapsed / 14);
        player.speed = 2.15 + state.wave * 0.04 + (player.boostTimer > 0 ? 1.0 : 0);
        player.angle += player.speed * dt;

        if (player.boostTimer > 0) player.boostTimer -= dt;
        if (state.invuln > 0) state.invuln -= dt;

        state.enemyTimer -= dt;
        const enemyInterval = Math.max(0.35, 1.1 - state.wave * 0.07);
        if (state.enemyTimer <= 0) {
          state.enemyTimer = enemyInterval;
          spawnEnemy();
        }

        state.powerTimer -= dt;
        if (state.powerTimer <= 0) {
          state.powerTimer = 6 + Math.random() * 5;
          if (powerups.length < 2) spawnPowerup();
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.angle += e.speed * dt;
        }

        for (let i = powerups.length - 1; i >= 0; i--) {
          powerups[i].ttl -= dt;
          if (powerups[i].ttl <= 0) powerups.splice(i, 1);
        }

        const p = playerPos();

        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (e.lane !== player.lane) continue;
          const ep = objPos(e);
          const dx = p.x - ep.x;
          const dy = p.y - ep.y;
          const rr = player.radius + e.radius;
          if (dx * dx + dy * dy <= rr * rr) {
            emit(ep.x, ep.y, e.color, 18);
            enemies.splice(i, 1);
            damagePlayer();
          }
        }

        for (let i = powerups.length - 1; i >= 0; i--) {
          const po = powerups[i];
          if (po.lane !== player.lane) continue;
          const op = objPos(po);
          const dx = p.x - op.x;
          const dy = p.y - op.y;
          const rr = player.radius + po.radius;
          if (dx * dx + dy * dy <= rr * rr) {
            applyPowerup(po.type);
            emit(op.x, op.y, "#82cfff", 14);
            state.score += 40;
            powerups.splice(i, 1);
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const part = particles[i];
          part.life -= dt;
          if (part.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          part.x += part.vx * dt;
          part.y += part.vy * dt;
          part.vx *= 0.98;
          part.vy *= 0.98;
        }

        updateHud();
      }

      function drawOrbit() {
        for (let i = 0; i < 3; i++) {
          const r = player.orbitR[i] * (world.w / 720);
          ctx.beginPath();
          ctx.strokeStyle = i === player.lane ? "rgba(130,207,255,0.45)" : "rgba(130,207,255,0.14)";
          ctx.lineWidth = i === player.lane ? 4 : 2;
          ctx.arc(world.centerX, world.centerY, r, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawPlayer() {
        const p = playerPos();
        const inv = state.invuln > 0;
        ctx.beginPath();
        ctx.fillStyle = inv ? "#54f0ab" : "#82cfff";
        ctx.shadowColor = inv ? "#54f0ab" : "#82cfff";
        ctx.shadowBlur = 20;
        ctx.arc(p.x, p.y, player.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 3;
        ctx.arc(p.x, p.y, player.radius + 9, player.angle - 0.65, player.angle + 0.65);
        ctx.stroke();
      }

      function drawEnemy(e) {
        const ep = objPos(e);
        ctx.beginPath();
        ctx.fillStyle = e.color;
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 12;
        ctx.arc(ep.x, ep.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      function drawPowerup(po) {
        const op = objPos(po);
        const color = po.type === "life" ? "#54f0ab" : po.type === "shield" ? "#82cfff" : "#ffd166";

        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.arc(op.x, op.y, po.radius + 4, state.elapsed * 2, state.elapsed * 2 + Math.PI * 1.5);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = color;
        ctx.arc(op.x, op.y, po.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = Math.max(0, Math.min(1, p.life));
          ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, "0");
          ctx.fillRect(p.x, p.y, 3, 3);
        }
      }

      function render() {
        ctx.clearRect(0, 0, world.w, world.h);

        const g = ctx.createRadialGradient(world.centerX, world.centerY, 10, world.centerX, world.centerY, world.w * 0.7);
        g.addColorStop(0, "rgba(70,110,255,0.18)");
        g.addColorStop(1, "rgba(6,8,22,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, world.w, world.h);

        drawOrbit();
        for (const e of enemies) drawEnemy(e);
        for (const po of powerups) drawPowerup(po);
        drawPlayer();
        drawParticles();
      }

      function loop(ts) {
        const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0.016);
        lastTime = ts;
        update(dt);
        render();
        rafId = requestAnimationFrame(loop);
      }

      function ensureLoop() {
        if (!rafId) {
          lastTime = performance.now();
          rafId = requestAnimationFrame(loop);
        }
      }

      function togglePause() {
        if (state.gameOver) return;
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? "再開" : "ポーズ";
        setMessage(state.paused ? "PAUSED" : "");
      }

      startBtn.addEventListener("click", () => {
        resetGame();
        ensureLoop();
      });

      pauseBtn.addEventListener("click", togglePause);

      canvas.addEventListener("pointerdown", (e) => {
        pointerStartX = e.clientX;
        if (state.gameOver) {
          resetGame();
          ensureLoop();
        }
      });

      canvas.addEventListener("pointerup", (e) => {
        if (pointerStartX == null) return;
        const dx = e.clientX - pointerStartX;
        if (Math.abs(dx) > 20) laneMove(dx > 0 ? 1 : -1);
        pointerStartX = null;
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") laneMove(-1);
        if (e.key === "ArrowRight") laneMove(1);
        if (e.key.toLowerCase() === "p") togglePause();
        if (e.key === " " && state.gameOver) {
          resetGame();
        }
      });

      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      updateHud();
      setMessage("Orbit Pulse Runner\nスタートボタンで開始");
      setTip("モバイル想定: 片手スワイプで遊べるアーケードサバイバル");
      ensureLoop();
    })();
  </script>
</body>
</html>
