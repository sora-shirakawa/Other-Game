<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Neon Orbit Survivor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060a17;
      --panel: rgba(9, 14, 31, 0.78);
      --neon: #66f7ff;
      --warning: #ff4d6d;
      --good: #8dff66;
      --text: #eff4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #162348 0%, var(--bg) 45%, #01040b 100%);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .game-shell {
      width: min(96vw, 520px);
      aspect-ratio: 9 / 16;
      max-height: 96svh;
      background: linear-gradient(180deg, rgba(14, 23, 48, 0.9), rgba(4, 7, 18, 0.95));
      border: 1px solid rgba(130, 188, 255, 0.35);
      border-radius: 20px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px;
    }

    .top-row {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    }

    .stat {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 0.9rem;
      min-width: 96px;
      text-align: center;
    }

    .bottom-row {
      display: grid;
      place-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 0.82rem;
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 14px;
      opacity: 0.95;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(2, 5, 13, 0.6);
      backdrop-filter: blur(4px);
      padding: 16px;
    }

    .card {
      width: min(92%, 380px);
      background: rgba(9, 14, 31, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
    }

    .card h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0.04em;
    }

    .card p {
      margin: 8px 0;
      font-size: 0.93rem;
      opacity: 0.92;
      line-height: 1.45;
    }

    button {
      pointer-events: auto;
      margin-top: 12px;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      color: #00152a;
      background: linear-gradient(180deg, #88fcff, #36dfff);
      padding: 12px 24px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(68, 210, 255, 0.45);
    }

    button:active {
      transform: translateY(1px) scale(0.995);
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" width="360" height="640"></canvas>

    <div class="hud">
      <div class="top-row">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">BEST: <span id="best">0</span></div>
        <div class="stat">COMBO: <span id="combo">x1</span></div>
      </div>
      <div class="bottom-row">
        <div class="hint">画面を押している間だけ減速シールド（クールダウン制）</div>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <div class="card">
        <h1>NEON ORBIT SURVIVOR</h1>
        <p>左右ドラッグで自機を回転させ、中心へ飛んでくる敵を回避！</p>
        <p>ギリギリ回避でコンボ上昇。押し続けると減速シールドで難所を抜けられます。</p>
        <p id="resultText">最長生存を目指そう。</p>
        <button id="startBtn">スタート</button>
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const comboEl = document.getElementById("combo");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const resultText = document.getElementById("resultText");

    const bestKey = "neonOrbitBest";
    const game = {
      running: false,
      score: 0,
      combo: 1,
      time: 0,
      enemyTimer: 0,
      hazardTimer: 0,
      stars: [],
      enemies: [],
      pulses: [],
      slowCharge: 1,
      pressHold: false,
      nearMissBoost: 0,
    };

    const player = {
      angle: -Math.PI / 2,
      radius: 122,
      size: 11,
      speed: 3.4,
      x: 0,
      y: 0,
    };

    const center = { x: canvas.width / 2, y: canvas.height / 2 };

    function setupStars() {
      game.stars = Array.from({ length: 70 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.4,
        speed: Math.random() * 0.4 + 0.2,
      }));
    }

    function resetGame() {
      game.running = true;
      game.score = 0;
      game.combo = 1;
      game.time = 0;
      game.enemyTimer = 0;
      game.hazardTimer = 0;
      game.enemies = [];
      game.pulses = [];
      game.slowCharge = 1;
      game.nearMissBoost = 0;
      player.angle = -Math.PI / 2;
      updateHUD();
    }

    function getBest() {
      return Number(localStorage.getItem(bestKey) || 0);
    }

    function setBest(v) {
      localStorage.setItem(bestKey, String(v));
    }

    function updateHUD() {
      scoreEl.textContent = Math.floor(game.score);
      bestEl.textContent = getBest();
      comboEl.textContent = `x${game.combo.toFixed(1)}`;
    }

    function spawnEnemy() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;

      if (edge === 0) {
        x = Math.random() * canvas.width;
        y = -18;
      } else if (edge === 1) {
        x = canvas.width + 18;
        y = Math.random() * canvas.height;
      } else if (edge === 2) {
        x = Math.random() * canvas.width;
        y = canvas.height + 18;
      } else {
        x = -18;
        y = Math.random() * canvas.height;
      }

      const dx = center.x - x;
      const dy = center.y - y;
      const len = Math.hypot(dx, dy) || 1;
      const speed = 95 + Math.min(220, game.time * 4.2) + Math.random() * 24;

      game.enemies.push({
        x,
        y,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        size: 8 + Math.random() * 6,
        grazed: false,
      });
    }

    function createPulse(x, y, color, life = 0.32, size = 8) {
      game.pulses.push({ x, y, color, life, max: life, size });
    }

    function handleInput(dx, dt) {
      player.angle += dx * player.speed * dt;
      const drag = game.pressHold && game.slowCharge > 0 ? 0.46 : 1;
      if (game.pressHold && game.slowCharge > 0) {
        game.slowCharge = Math.max(0, game.slowCharge - dt * 0.34);
      } else {
        game.slowCharge = Math.min(1, game.slowCharge + dt * 0.18);
      }
      return drag;
    }

    let pendingDX = 0;
    let dragging = false;
    let lastX = 0;

    function pointerDown(e) {
      dragging = true;
      game.pressHold = true;
      lastX = e.clientX;
    }

    function pointerMove(e) {
      if (!dragging) return;
      pendingDX += (e.clientX - lastX) / canvas.width;
      lastX = e.clientX;
    }

    function pointerUp() {
      dragging = false;
      game.pressHold = false;
    }

    canvas.addEventListener("pointerdown", pointerDown);
    canvas.addEventListener("pointermove", pointerMove);
    window.addEventListener("pointerup", pointerUp);
    window.addEventListener("pointercancel", pointerUp);

    function update(dt) {
      if (!game.running) return;

      game.time += dt;
      const drag = handleInput(pendingDX, dt);
      pendingDX = 0;

      const spawnInterval = Math.max(0.28, 1.02 - game.time * 0.02);
      game.enemyTimer += dt;
      while (game.enemyTimer > spawnInterval) {
        game.enemyTimer -= spawnInterval;
        spawnEnemy();
      }

      player.x = center.x + Math.cos(player.angle) * player.radius;
      player.y = center.y + Math.sin(player.angle) * player.radius;

      let dead = false;
      game.enemies.forEach((enemy) => {
        enemy.x += enemy.vx * dt * drag;
        enemy.y += enemy.vy * dt * drag;

        const dPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
        if (dPlayer < enemy.size + player.size) dead = true;

        const near = enemy.size + player.size + 18;
        if (dPlayer < near && !enemy.grazed) {
          enemy.grazed = true;
          game.combo = Math.min(9.9, game.combo + 0.2);
          game.nearMissBoost = Math.min(1.2, game.nearMissBoost + 0.12);
          createPulse(player.x, player.y, "#8dff66", 0.24, 6);
        }
      });

      game.enemies = game.enemies.filter((enemy) => {
        const dc = Math.hypot(enemy.x - center.x, enemy.y - center.y);
        if (dc < 12) {
          createPulse(center.x, center.y, "#ff4d6d", 0.3, 10);
          return false;
        }
        return enemy.x > -34 && enemy.x < canvas.width + 34 && enemy.y > -34 && enemy.y < canvas.height + 34;
      });

      game.pulses = game.pulses.filter((p) => {
        p.life -= dt;
        p.size += dt * 58;
        return p.life > 0;
      });

      game.combo = Math.max(1, game.combo - dt * 0.16);
      game.nearMissBoost = Math.max(0, game.nearMissBoost - dt * 0.3);
      game.score += dt * 50 * game.combo * (1 + game.nearMissBoost * 0.3);

      if (dead) endGame();
      updateHUD();
    }

    function drawBackground() {
      const g = ctx.createRadialGradient(center.x, center.y, 20, center.x, center.y, 390);
      g.addColorStop(0, "#152345");
      g.addColorStop(0.5, "#0a1228");
      g.addColorStop(1, "#02050f");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      game.stars.forEach((s) => {
        s.y += s.speed;
        if (s.y > canvas.height + 2) s.y = -2;
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = "#d9ebff";
        ctx.fillRect(s.x, s.y, s.size, s.size);
      });
      ctx.globalAlpha = 1;
    }

    function drawWorld() {
      drawBackground();

      ctx.strokeStyle = "rgba(102,247,255,0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(center.x, center.y, player.radius, 0, Math.PI * 2);
      ctx.stroke();

      const chargeArc = game.slowCharge * Math.PI * 2;
      ctx.strokeStyle = game.slowCharge > 0.2 ? "#66f7ff" : "#ffb84d";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(center.x, center.y, player.radius + 10, -Math.PI / 2, -Math.PI / 2 + chargeArc);
      ctx.stroke();

      game.enemies.forEach((enemy) => {
        const pulse = 0.8 + Math.sin(game.time * 6 + enemy.x * 0.04) * 0.22;
        ctx.fillStyle = `rgba(255,77,109,${0.82 * pulse})`;
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
        ctx.fill();
      });

      game.pulses.forEach((p) => {
        ctx.globalAlpha = p.life / p.max;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;

      const bodyColor = game.pressHold && game.slowCharge > 0 ? "#f8ff8b" : "#66f7ff";
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(102,247,255,0.35)";
      ctx.beginPath();
      ctx.arc(center.x, center.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    function endGame() {
      game.running = false;
      const final = Math.floor(game.score);
      const best = getBest();
      if (final > best) setBest(final);

      resultText.textContent = `スコア ${final} / ベスト ${Math.max(final, best)}。もう一度挑戦！`;
      startBtn.textContent = "リトライ";
      overlay.classList.remove("hidden");
    }

    function loop(ts) {
      if (!loop.last) loop.last = ts;
      const dt = Math.min(0.033, (ts - loop.last) / 1000);
      loop.last = ts;

      update(dt);
      drawWorld();
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener("click", () => {
      overlay.classList.add("hidden");
      resetGame();
    });

    setupStars();
    updateHUD();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
